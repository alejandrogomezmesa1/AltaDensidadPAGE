<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Simulador de Checkout - Mercado Pago (mock)</title>
  <style>
    body { font-family: system-ui, -apple-system, Roboto, 'Segoe UI', Arial; background:#0f1724; color:#fff; display:flex; align-items:center; justify-content:center; height:100vh; margin:0 }
    .card{background:#0b1220;padding:20px;border-radius:8px;max-width:640px;width:100%;box-shadow:0 8px 24px rgba(0,0,0,.6)}
    button{margin:6px;padding:10px 14px;border-radius:6px;border:0;background:#c59d1f;color:#0b0b0b;font-weight:700;cursor:pointer}
    .muted{color:#9aa4b2;font-size:.95rem}
  </style>
</head>
<body>
  <div class="card">
    <h2>Simulador de Checkout (Mock)</h2>
    <p class="muted">Usa este formulario para simular la redirección que hace Mercado Pago tras crear una preferencia.</p>
    <p id="pref">Cargando preferencia...</p>
    <div>
      <button id="ok">Simular Pago Aprobado</button>
      <button id="pend">Simular Pago Pendiente</button>
      <button id="fail">Simular Pago Fallido</button>
    </div>
    <p class="muted">Al presionar un botón serás redirigido a la página correspondiente (success/failure/pending).</p>
  </div>

  <script>
    function qs(name){
      return new URLSearchParams(location.search).get(name);
    }
    const pref = qs('pref_id') || 'mock';
    document.getElementById('pref').textContent = 'Preferencia: ' + pref;

    function redirect(status){
      const base = location.origin;
      const url = base + '/' + (status === 'approved' ? 'success.html' : status === 'pending' ? 'pending.html' : 'failure.html') + '?pref_id=' + encodeURIComponent(pref) + '&status=' + status;
      location.href = url;
    }

    document.getElementById('ok').addEventListener('click', ()=> redirect('approved'));
    document.getElementById('pend').addEventListener('click', ()=> redirect('pending'));
    document.getElementById('fail').addEventListener('click', ()=> redirect('failure'));
  </script>
</body>
</html>
