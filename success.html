<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Resultado del Pago — Fragancias de Alta Densidad</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;background:#0b1220;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0} .card{background:#071023;padding:24px;border-radius:10px;max-width:720px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.6)} button{background:#c59d1f;border:0;padding:10px 14px;border-radius:6px;color:#071023;font-weight:700;cursor:pointer}</style>
  </head>
<body>
  <div class="card">
    <h1>Procesando resultado del pago...</h1>
    <div id="content">Cargando información del pago, espera un momento...</div>
    <div style="margin-top:12px"><button id="home">Volver al inicio</button></div>
  </div>

  <script>
    const content = document.getElementById('content');
    document.getElementById('home').addEventListener('click', ()=> location.href = '/index.html');

    function qs(name){ return new URLSearchParams(location.search).get(name); }
    const paymentId = qs('payment_id') || qs('collection_id') || qs('collection_id') || qs('collection_id');
    const base = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
        ? 'http://localhost:3000/api'
        : 'https://altadensidadpage-production.up.railway.app/api';

    async function verify() {
      if (!paymentId) { content.innerHTML = '<p class="text-muted">No se detectó identificador de pago en la URL.</p>'; return; }
      try {
        content.innerHTML = '<div class="loader"><i class="fas fa-circle-notch fa-spin"></i></div><p>Verificando transacción...</p>';
        const resp = await fetch(`${base}/mercadopago/verify_payment${location.search}`);
        const data = await resp.json();
        if (!data.success) { 
          content.innerHTML = `<div class="status-icon error"><i class="fas fa-exclamation-triangle"></i></div><h3>Error de Verificación</h3><p>${esc(data.message || '')}</p>`; 
          return; 
        }
        const order = data.order;
        if (order && order.status === 'approved') {
          try { sessionStorage.removeItem('altadensidad_carrito'); } catch {};
          content.innerHTML = `
            <div class="status-icon success"><i class="fas fa-check-circle"></i></div>
            <h3>¡Gracias por tu compra!</h3>
            <p>Tu pago ha sido aprobado exitosamente.</p>
            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left;">
              <p style="margin: 5px 0;">Referencia: <strong>${esc(order.external_reference)}</strong></p>
              <p style="margin: 5px 0;">Total: <strong>$${Number(order.total).toLocaleString('es-CO')} COP</strong></p>
            </div>
            <p style="font-size: 0.85rem; color: #9aa4b2; margin-top: 20px;">Recibirás un correo de confirmación y nos pondremos en contacto pronto.</p>
          `;
        } else {
          content.innerHTML = `
            <div class="status-icon pending"><i class="fas fa-clock"></i></div>
            <h3>Pago en Proceso</h3>
            <p>El estado actual es: <strong>${esc(order ? order.status : 'desconocido')}</strong></p>
            <p>Te notificaremos cuando se complete la validación.</p>
          `;
        }
      } catch (err) { 
        content.innerHTML = '<div class="status-icon error"><i class="fas fa-wifi"></i></div><p>Error de red al verificar el pago.</p>'; 
      }
    }
    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
    verify();
  </script>
</body>
</html>
