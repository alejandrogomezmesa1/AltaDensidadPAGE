    <!-- ===== MODAL DATOS ENVIO ===== -->
    <div id="envioModal" class="prod-modal-overlay modal-claro" style="display: none; z-index: 9999" role="dialog" aria-modal="true" aria-labelledby="envioModalTitulo">
      <div class="prod-modal" style="max-width: 500px; padding: 25px; border: 1px solid var(--border)">
        <button type="button" class="prod-modal-close" id="cerrarEnvioModal" aria-label="Cerrar"><i class="fas fa-times"></i></button>
        <h2 id="envioModalTitulo" style="color: var(--gold); margin-bottom: 10px; font-size: 1.5rem; text-align: center;">Datos de Envío</h2>

          <div style="display: flex; flex-direction: column; gap: 5px">
            <label style="color: var(--gold-soft); font-size: 0.85rem; font-weight: 600;">Nombre Completo *</label>
            <input type="text" id="envNombre" required style="padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); outline: none;" />
          </div>

          <div style="display: flex; flex-direction: column; gap: 5px">
            <label style="color: var(--gold-soft); font-size: 0.85rem; font-weight: 600;">Documento de Identidad (Cédula/NIT) *</label>
            <input type="text" id="envDocumento" required style="padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); outline: none;" />

          <div style="display: flex; flex-direction: column; gap: 5px">
            <label style="color: var(--gold-soft); font-size: 0.85rem; font-weight: 600;">Celular *</label>

            <label style="color: var(--gold-soft); font-size: 0.85rem; font-weight: 600;">Ciudad *</label>

          </div>

          <div style="display: flex; flex-direction: column; gap: 5px">
            <label style="color: var(--gold-soft); font-size: 0.85rem; font-weight: 600;">Dirección y Barrio *</label>
            <input type="text" id="envDireccion" required placeholder="Ej: Calle 123 #45-67, Barrio Centro" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); outline: none;" />
          </div>

          <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start;">
            <div style="flex:1; min-width:140px; display:flex; flex-direction:column; gap:5px;">
              <label style="color: var(--gold-soft); font-size: 0.85rem; font-weight: 600;">Piso / Apto</label>
              <input type="text" id="envPiso" placeholder="Piso, apartamento o local" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); outline: none;" />
            </div>
            <div style="flex:1; min-width:140px; display:flex; flex-direction:column; gap:5px;">
              <label style="color: var(--gold-soft); font-size: 0.85rem; font-weight: 600;">Municipio</label>
              <input type="text" id="envMunicipio" placeholder="Municipio (si aplica)" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); outline: none;" />
            </div>
          </div>

          <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start;">
            <div style="flex:1; min-width:140px; display:flex; flex-direction:column; gap:5px;">

            </div>
            <div style="flex:1; min-width:140px; display:flex; flex-direction:column; gap:5px;">
              <label style="color: var(--gold-soft); font-size: 0.85rem; font-weight: 600;">Número de contacto (alternativo)</label>
              <input type="tel" id="envContactoAlt" placeholder="Teléfono alternativo" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); outline: none;" />
            </div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="color: var(--gold-soft); font-size: 0.85rem; font-weight: 600;">Referencia / Descripción</label>
            <textarea id="envReferencia" rows="2" placeholder="Descripción breve para facilitar la entrega (p. ej. 'Entrada por la carrera 5, tocar timbre B')" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); outline: none; resize: vertical;"></textarea>
          </div>

          <div id="envioError" class="env-error" role="alert" aria-live="assertive" style="display: none"></div>

          <button type="submit" id="btnConfirmarEnvio" style="margin-top: 10px; background: var(--gold); color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 6px; cursor: pointer; transition: background 0.2s;"><i class="fas fa-lock"></i> Continuar al Pago Seguro</button>
        </form>
      </div>

            <div class="prod-modal-footer">

                <i class="fas fa-cart-plus"></i> Agregar al carrito

            </div>
          </div>
        </div>
      </div>
    </div>
