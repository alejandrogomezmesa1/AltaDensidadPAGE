<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f6fa;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}
form {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 2rem 2.5rem 1.5rem 2.5rem;
  margin: 2rem 0 0 0;
  width: 100%;
  max-width: 370px;
  display: flex;
  flex-direction: column;
  gap: 1.1rem;
}
h2 {
  margin: 0 0 0.5rem 0;
  color: #2d3436;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 0.5px;
}
label {
  color: #636e72;
  font-size: 1rem;
  margin-bottom: 0.2rem;
}
input[type="email"],
input[type="text"],
input[type="password"] {
  padding: 0.7rem 1rem;
  border: 1px solid #dfe6e9;
  border-radius: 6px;
  font-size: 1rem;
  background: #f9f9fb;
  transition: border 0.2s;
}
input:focus {
  border: 1.5px solid #0984e3;
  outline: none;
}
button {
  background: linear-gradient(90deg, #0984e3 60%, #00b894 100%);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 0.8rem 0;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 0.5rem;
  box-shadow: 0 1px 4px rgba(9,132,227,0.08);
  transition: background 0.2s, box-shadow 0.2s;
}
button:hover {
  background: linear-gradient(90deg, #00b894 60%, #0984e3 100%);
  box-shadow: 0 2px 8px rgba(9,132,227,0.13);
}
#forgot-password-msg,
#confirm-code-msg,
#reset-password-msg {
  min-height: 1.2em;
  font-size: 0.98rem;
  color: #d63031;
  margin-top: -0.7rem;
}
</style>

<!-- Estructura mejorada e interactiva -->
<div class="reset-wrapper">
  <div class="reset-card">
    <!-- Formulario 1: Solicitar email para recuperar contraseña -->
    <form id="forgot-password-form" class="reset-form">
      <h2>¿Olvidaste tu contraseña?</h2>
      <label for="email">Correo electrónico:</label>
      <div class="input-group">
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <button type="submit">Enviar código</button>
      <div id="forgot-password-msg" class="reset-msg"></div>
    </form>

    <!-- Formulario 2: Confirmar código enviado al correo -->
    <form id="confirm-code-form" class="reset-form hidden">
      <h2>Confirma tu código</h2>
      <label for="code">Código recibido:</label>
      <div class="input-group">
        <input type="text" id="code" name="code" required autocomplete="one-time-code">
      </div>
      <input type="hidden" id="email-confirm" name="email">
      <button type="submit">Verificar código</button>
      <div id="confirm-code-msg" class="reset-msg"></div>
    </form>

    <!-- Formulario 3: Resetear contraseña -->
    <form id="reset-password-form" class="reset-form hidden">
      <h2>Restablecer contraseña</h2>
      <label for="new-password">Nueva contraseña:</label>
      <div class="input-group">
        <input type="password" id="new-password" name="new-password" required minlength="6" autocomplete="new-password">
        <button type="button" class="toggle-pass" tabindex="-1" aria-label="Mostrar/Ocultar contraseña" onclick="togglePassword('new-password', this)"><i class="fas fa-eye"></i></button>
      </div>
      <label for="confirm-password">Confirmar contraseña:</label>
      <div class="input-group">
        <input type="password" id="confirm-password" name="confirm-password" required minlength="6" autocomplete="new-password">
        <button type="button" class="toggle-pass" tabindex="-1" aria-label="Mostrar/Ocultar contraseña" onclick="togglePassword('confirm-password', this)"><i class="fas fa-eye"></i></button>
      </div>
      <input type="hidden" id="reset-token" name="token">
      <input type="hidden" id="reset-email" name="email">
      <button type="submit">Cambiar contraseña</button>
      <div id="reset-password-msg" class="reset-msg"></div>
    </form>
  </div>
  <a href="login.html" class="volver-link"><i class="fas fa-arrow-left"></i> Volver al login</a>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous">
<link rel="stylesheet" href="assets/css/reset.css">
<script src="assets/js/reset.js" defer></script>
<script>
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  if (!input) return;
  if (input.type === 'password') {
    input.type = 'text';
    btn.querySelector('i').classList.remove('fa-eye');
    btn.querySelector('i').classList.add('fa-eye-slash');
  } else {
    input.type = 'password';
    btn.querySelector('i').classList.remove('fa-eye-slash');
    btn.querySelector('i').classList.add('fa-eye');
  }
}
// Feedback visual interactivo para mensajes
['forgot-password-msg','confirm-code-msg','reset-password-msg'].forEach(id => {
  const el = document.getElementById(id);
  if (el) {
    const observer = new MutationObserver(() => {
      if (el.textContent.includes('éxito') || el.textContent.includes('restablecida') || el.textContent.includes('Revisa tu correo')) {
        el.classList.add('success');
      } else {
        el.classList.remove('success');
      }
    });
    observer.observe(el, { childList: true });
  }
});
</script>
